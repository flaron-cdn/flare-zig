name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v1
        with:
          version: "0.13.0"

      - name: Test
        run: zig build test

      - name: Build release examples
        run: zig build -Doptimize=ReleaseSmall

      - name: Package artifacts
        run: |
          mkdir -p dist
          cp zig-out/bin/*.wasm dist/ 2>/dev/null || true
          cp zig-out/lib/*.wasm dist/ 2>/dev/null || true
          tar czf dist/flare-zig-examples-${{ github.ref_name }}.tar.gz -C dist . --exclude='*.tar.gz'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/flare-zig-examples-${{ github.ref_name }}.tar.gz
